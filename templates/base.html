{% load static %}
<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Eco Life | {% block title %}{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg-black: #000000;
            --gold: #FFD700;
            --gold-gradient: linear-gradient(45deg, #BF953F, #FCF6BA, #B38728, #FBF5B7, #AA771C);
            --glass: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.08);
        }
        body { background: var(--bg-black); color: #fff; font-family: 'Inter', sans-serif; overflow-x: hidden; }
        
        /* Navbar Scrolled State */
        .navbar.scrolled { background: rgba(0, 0, 0, 0.9); border-bottom: 1px solid rgba(255, 215, 0, 0.3); padding: 12px 0; }
        
        .service-card {
            background: var(--glass);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            padding: 30px;
            transition: 0.3s;
            height: 100%;
        }
        .service-card:hover { transform: translateY(-5px); border-color: var(--gold); }
        .text-gold { color: var(--gold); }
    </style>
    {% block extra_css %}{% endblock %}
</head>
<body>
    {% include 'includes/navbar.html' %}

    <div style="padding-top: 100px;">
        {% block content %}{% endblock %}
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        window.onscroll = function () {
            const nav = document.getElementById('mainNav');
            if (window.pageYOffset > 50) {
                nav.classList.add("scrolled");
            } else {
                nav.classList.remove("scrolled");
            }
        };
    </script>
    {% block extra_js %}{% endblock %}
</body>
</html>
