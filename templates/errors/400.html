<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>400 - Noto'g'ri so'rov</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #f4f7f6;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            color: #333;
        }

        .container {
            text-align: center;
            padding: 20px;
        }

        .error-code {
            font-size: 120px;
            font-weight: 900;
            color: #e74c3c;
            line-height: 1;
            margin-bottom: 10px;
        }

        .error-message {
            font-size: 24px;
            font-weight: 600;
            margin-bottom: 20px;
        }

        .description {
            color: #666;
            margin-bottom: 30px;
            max-width: 400px;
            margin-left: auto;
            margin-right: auto;
        }

        .btn {
            display: inline-block;
            padding: 12px 25px;
            background-color: #3498db;
            color: white;
            text-decoration: none;
            border-radius: 5px;
            transition: background 0.3s ease;
        }

        .btn:hover {
            background-color: #2980b9;
        }

        .icon {
            font-size: 50px;
            margin-bottom: 20px;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="icon">⚠️</div>
        <div class="error-code">400</div>
        <div class="error-message">So'rovda xatolik!</div>
        <p class="description">
            Kechirasiz, brauzeringiz yuborgan so'rovni server tushuna olmadi. 
            Iltimos, ma'lumotlarni tekshirib qaytadan urinib ko'ring.
        </p>
        <a href="{% url 'enterance' %}" class="btn">Bosh sahifaga qaytish</a>
    </div>

</body>
</html>
