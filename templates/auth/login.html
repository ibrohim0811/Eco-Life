{% load static %}
<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eco-Life Premium Login</title>
    <link rel="icon" type="image/x-icon" href="{% static 'favicons/favico.png' %}">
    
    <script src="https://challenges.cloudflare.com/turnstile/v0/api.js" async defer></script>

    <style>
        :root {
            --primary-color: #00d2ff;
            --accent-color: #92fe9d;
            --dark-bg: #0f172a;
            --glass-bg: rgba(34, 38, 46, 0.7);
            --glass-border: rgba(255, 255, 255, 0.1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }

        body {
            background-color: #070b15;
            background-size: cover;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .login-box {
            background: var(--glass-bg);
            backdrop-filter: blur(25px);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            padding: 50px 40px;
            width: 100%;
            max-width: 420px;
            text-align: center;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            color: white;
        }

        h2 {
            font-size: 2rem;
            margin-bottom: 10px;
            font-weight: 800;
            background: linear-gradient(to right, var(--primary-color), var(--accent-color));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .error-list {
            list-style: none;
            background: rgba(255, 77, 77, 0.15);
            border-radius: 10px;
            padding: 10px;
            margin-bottom: 20px;
            color: #ff4d4d;
            font-size: 14px;
        }

        .input-group { margin-bottom: 20px; }

        input[type="text"], input[type="password"] {
            width: 100%;
            padding: 16px 20px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 14px;
            outline: none;
            color: white;
            transition: 0.3s;
        }

        input:focus { border-color: var(--primary-color); box-shadow: 0 0 15px rgba(0, 210, 255, 0.3); }

        .cf-turnstile {
            display: flex;
            justify-content: center;
            margin-bottom: 20px;
        }

        button {
            width: 100%;
            padding: 16px;
            border: none;
            border-radius: 14px;
            background: linear-gradient(135deg, var(--primary-color), var(--accent-color));
            color: #0f172a;
            font-weight: 700;
            cursor: pointer;
            transition: 0.4s;
        }

        button:hover { transform: translateY(-2px); filter: brightness(1.1); }
    </style>
</head>
<body>

    <div class="login-box">
        <h2>Eco-Life</h2>
        <p style="color: rgba(255,255,255,0.5); font-size: 0.9rem; margin-bottom: 30px;">Tizimga xush kelibsiz</p>

        {% if messages %}
            <ul class="error-list">
                {% for message in messages %}
                    <li>{{ message }}</li>
                {% endfor %}
            </ul>
        {% endif %}

        <form method="POST">
            {% csrf_token %}
            
            <div class="input-group">
                <input type="text" name="username" placeholder="Foydalanuvchi nomi" required>
            </div>
            
            <div class="input-group">
                <input type="password" name="password" placeholder="Parol" required>
            </div>

            <div class="cf-turnstile" data-sitekey="0x4AAAAAACrvS1Pa-y_o4pOG" data-theme="dark"></div>

            <button type="submit">Tizimga kirish</button>
        </form>
    </div>
    
</body>
</html>
