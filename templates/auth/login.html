{% load static %}
<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eco-Life Premium Login</title>
    <link rel="icon" type="image/x-icon" href="{% static 'favicons/favico.png' %}">
    
    <style>
        :root {
            --primary-color: #00d2ff;
            --accent-color: #92fe9d;
            --dark-bg: #0f172a; /* Deep Navy Dark */
            --glass-bg: rgba(34, 38, 46, 0.7);
            --glass-border: rgba(255, 255, 255, 0.1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', -apple-system, system-ui, sans-serif;
        }

        body {
            background: 
                        url("{% static 'images/login_background.jpg' %}") no-repeat center center fixed;
            background-size: cover;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        /* Responsive Login Box */
        .login-box {
            background: var(--glass-bg);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            padding: 50px 40px;
            width: 100%;
            max-width: 420px; /* Kattaroq ekranlar uchun limit */
            text-align: center;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            color: white;
            transition: transform 0.3s ease;
        }

        h2 {
            font-size: 2rem;
            margin-bottom: 10px;
            font-weight: 800;
            background: linear-gradient(to right, var(--primary-color), var(--accent-color));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -1px;
        }

        p.subtitle {
            color: rgba(255, 255, 255, 0.5);
            font-size: 0.9rem;
            margin-bottom: 30px;
        }

        .input-group {
            margin-bottom: 20px;
            position: relative;
        }

        input[type="text"], input[type="password"] {
            width: 100%;
            padding: 16px 20px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 14px;
            outline: none;
            color: white;
            font-size: 16px;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        input::placeholder { color: rgba(255, 255, 255, 0.4); }

        input:focus {
            background: rgba(255, 255, 255, 0.08);
            border-color: var(--primary-color);
            box-shadow: 0 0 15px rgba(0, 210, 255, 0.3);
        }

        .remember-me-container {
            margin: 25px 0;
            display: flex;
            flex-direction: column;
            align-items: flex-start;
        }

        .checkbox-wrapper {
            display: flex;
            align-items: center;
            cursor: pointer;
        }

        /* Custom Checkbox Style */
        .checkbox-wrapper input {
            accent-color: var(--primary-color);
            width: 20px;
            height: 20px;
            margin-right: 12px;
        }

        .remember-text {
            font-size: 14px;
            color: rgba(255, 255, 255, 0.7);
            transition: color 0.3s;
        }

        .remember-text:hover { color: white; text-decoration: underline; }

        .info-text {
            max-height: 0;
            overflow: hidden;
            font-size: 12px;
            color: rgba(255, 255, 255, 0.4);
            margin-top: 10px;
            line-height: 1.5;
            transition: all 0.4s ease;
            text-align: left;
        }

        .show-info { max-height: 80px; margin-bottom: 10px; }

        button {
            width: 100%;
            padding: 16px;
            border: none;
            border-radius: 14px;
            background: linear-gradient(135deg, var(--primary-color), var(--accent-color));
            color: #0f172a;
            font-weight: 700;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.4s ease;
            box-shadow: 0 10px 20px -10px rgba(0, 210, 255, 0.5);
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 15px 30px -10px rgba(0, 210, 255, 0.6);
            filter: brightness(1.1);
        }

        /* Mobile Responsiveness */
        @media (max-width: 480px) {
            .login-box {
                padding: 40px 25px;
                border-radius: 0; /* Mobil ekranlarda burchaklarni to'g'irlash mumkin */
                background: rgba(15, 23, 42, 0.9); /* Mobil qurilmalarda blur energiyani ko'p yeydi */
            }
            h2 { font-size: 1.7rem; }
        }
    </style>
</head>
<body>

    <div class="login-box">
        <h2>Eco-Life</h2>
        <p class="subtitle">Tizimga kirish uchun ma'lumotlarni kiriting</p>
        
        <form method="POST">
            {% csrf_token %}
            <div class="input-group">
                <input type="text" name="username" placeholder="Foydalanuvchi nomi" required>
            </div>
            <div class="input-group">
                <input type="password" name="password" placeholder="Parol" required>
            </div>
            <button type="submit">Tizimga kirish</button>
        </form>
    </div>

    
</body>
</html>
