<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Settings UI</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">
    <style>
        :root { --base-font-size: 16px; }
        body { 
            background-color: #f0f2f5; 
            transition: background 0.3s, color 0.3s; 
            font-family: 'Segoe UI', Tahoma, sans-serif;
            font-size: var(--base-font-size);
        }
        body.dark-mode { background-color: #18191a; color: #e4e6eb; }
        
        .dark-mode .card { background-color: #242526; border: none; color: #e4e6eb; }
        .dark-mode .list-group-item { background-color: #242526; border-color: #3e4042; color: #e4e6eb; }
        .dark-mode .bg-light { background-color: #3a3b3c !important; color: #fff; }
        
        .settings-card { border-radius: 15px; overflow: hidden; border: none; }
        .icon-box { width: 35px; height: 35px; border-radius: 8px; display: flex; align-items: center; justify-content: center; margin-right: 15px; }
        
        /* Slider styling */
        .custom-range::-webkit-slider-thumb { background: #007bff; }
    </style>
</head>
<body>

<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-8 col-lg-6">
            
            <div class="d-flex align-items-center mb-4">
                <button class="btn btn-light rounded-circle mr-3"><i class="fas fa-arrow-left"></i></button>
                <h3 class="mb-0 font-weight-bold">Sozlamalar</h3>
            </div>

            <div class="card settings-card shadow-sm mb-4">
                <div class="card-body p-0">
                    <div class="list-group list-group-flush">
                        <div class="list-group-item d-flex align-items-center justify-content-between py-3">
                            <div class="d-flex align-items-center">
                                <div class="icon-box bg-primary text-white shadow-sm">
                                    <i class="fas fa-moon"></i>
                                </div>
                                <div><p class="mb-0 font-weight-bold">Tungi rejim</p></div>
                            </div>
                            <div class="custom-control custom-switch">
                                <input type="checkbox" class="custom-control-input" id="darkSwitch" onclick="toggleTheme()">
                                <label class="custom-control-label" for="darkSwitch"></label>
                            </div>
                        </div>

                        <div class="list-group-item d-flex align-items-center justify-content-between py-3">
                            <div class="d-flex align-items-center">
                                <div class="icon-box bg-info text-white shadow-sm">
                                    <i class="fas fa-columns"></i>
                                </div>
                                <div><p class="mb-0">Sidebar yopiq holatda</p></div>
                            </div>
                            <div class="custom-control custom-switch">
                                <input type="checkbox" class="custom-control-input" id="sidebarSwitch">
                                <label class="custom-control-label" for="sidebarSwitch"></label>
                            </div>
                        </div>

                        <div class="list-group-item py-4">
                            <div class="d-flex align-items-center mb-3">
                                <div class="icon-box bg-secondary text-white shadow-sm">
                                    <i class="fas fa-font"></i>
                                </div>
                                <div><p class="mb-0 font-weight-bold">Shrift o'lchami: <span id="fontVal">16</span>px</p></div>
                            </div>
                            <input type="range" class="custom-range" min="12" max="24" value="16" id="fontSlider">
                            <div class="d-flex justify-content-between small text-muted mt-1">
                                <span>A</span>
                                <span>Katta A</span>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <div class="card settings-card shadow-sm mb-4">
                <div class="card-body p-0">
                    <div class="list-group list-group-flush">
                        <div class="list-group-item d-flex align-items-center justify-content-between py-3">
                            <div class="d-flex align-items-center">
                                <div class="icon-box bg-warning text-white shadow-sm">
                                    <i class="fas fa-bell"></i>
                                </div>
                                <span>Bildirishnomalar</span>
                            </div>
                            <div class="custom-control custom-switch">
                                <input type="checkbox" class="custom-control-input" id="notifSwitch" checked>
                                <label class="custom-control-label" for="notifSwitch"></label>
                            </div>
                        </div>

                        <div class="list-group-item d-flex align-items-center justify-content-between py-3">
                            <div class="d-flex align-items-center">
                                <div class="icon-box bg-success text-white shadow-sm">
                                    <i class="fas fa-volume-up"></i>
                                </div>
                                <span>Ovoz effektlari</span>
                            </div>
                            <div class="custom-control custom-switch">
                                <input type="checkbox" class="custom-control-input" id="soundSwitch">
                                <label class="custom-control-label" for="soundSwitch"></label>
                            </div>
                        </div>

                        <div class="list-group-item d-flex align-items-center justify-content-between py-3">
                            <div class="d-flex align-items-center">
                                <div class="icon-box bg-danger text-white shadow-sm">
                                    <i class="fas fa-mobile-alt"></i>
                                </div>
                                <span>Vibratsiya</span>
                            </div>
                            <div class="custom-control custom-switch">
                                <input type="checkbox" class="custom-control-input" id="vibrateSwitch" onclick="vibrateDevice()">
                                <label class="custom-control-label" for="vibrateSwitch"></label>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <p class="text-center text-muted small">O'zgarishlar avtomatik saqlanadi</p>

        </div>
    </div>
</div>

<script>
    // Theme toggle
    function toggleTheme() {
        document.body.classList.toggle('dark-mode');
    }

    // Font size slider logic
    const slider = document.getElementById('fontSlider');
    const fontValLabel = document.getElementById('fontVal');

    slider.addEventListener('input', function() {
        const size = this.value;
        fontValLabel.innerHTML = size;
        document.body.style.fontSize = size + 'px';
    });

    // Vibration demo
    function vibrateDevice() {
        if ("vibrate" in navigator) {
            navigator.vibrate(50); // 50ms tebranish
        }
    }
</script>

</body>
</html>
