<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kirish Cheklandi</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            background: #050505;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }
        .lockout-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 30px;
            padding: 40px;
            text-align: center;
            max-width: 400px;
            width: 90%;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            animation: ios-pop 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
        }
        @keyframes ios-pop {
            0% { transform: scale(0.9); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }
        .icon-circle {
            width: 80px;
            height: 80px;
            background: rgba(255, 69, 58, 0.2);
            color: #FF453A;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 35px;
            margin: 0 auto 25px;
        }
        h2 { font-weight: 700; margin-bottom: 15px; }
        p { color: rgba(255,255,255,0.6); line-height: 1.6; }
        .btn-retry {
            background: white;
            color: black;
            border-radius: 15px;
            padding: 12px 30px;
            font-weight: 600;
            text-decoration: none;
            display: inline-block;
            margin-top: 25px;
            transition: 0.3s;
        }
        .btn-retry:hover { opacity: 0.8; transform: scale(0.98); }
    </style>
</head>
<body>
    <div class="lockout-card">
        <div class="icon-circle">
            <i class="fas fa-user-lock"></i>
        </div>
        <h2>Kirish Cheklandi</h2>
        <p>Xavfsizlik tizimi ko'plab noto'g'ri urinishlarni aniqladi. Hisobingiz vaqtincha (1 soatga) bloklandi.</p>
        <p class="small mt-2">Iltimos, birozdan so'ng qayta urinib ko'ring yoki admin bilan bog'laning.</p>
        <a href="{% url 'enterance' %}" class="btn-retry">Asosiy sahifa</a>
    </div>
</body>
</html>
