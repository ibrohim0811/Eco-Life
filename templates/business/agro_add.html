<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Agro | Mahsulot Qo'shish</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --agro-green: #2ecc71;
            --agro-error: #ff3b30;
            --glass-bg: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.1);
        }

        body {
            background: radial-gradient(circle at top right, #1a1c22, #0b0d11);
            color: #fff;
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 40px 0;
        }

        .glass-container {
            width: 100%;
            max-width: 550px;
            padding: 20px;
        }

        .ios-card {
            background: var(--glass-bg);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border: 1px solid var(--glass-border);
            border-radius: 35px;
            padding: 40px;
            box-shadow: 0 25px 50px rgba(0,0,0,0.5);
        }

        .form-label {
            font-size: 11px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 8px;
            color: rgba(255,255,255,0.4);
            display: block;
        }

        .ios-input {
            background: rgba(255, 255, 255, 0.05) !important;
            border: 1px solid var(--glass-border) !important;
            border-radius: 16px !important;
            color: #fff !important;
            padding: 14px 18px !important;
            margin-bottom: 20px;
            transition: all 0.3s ease;
        }

        .ios-input:focus {
            border-color: var(--agro-green) !important;
            box-shadow: 0 0 20px rgba(46, 204, 113, 0.15) !important;
        }

        /* AI Status Banner */
        .ai-status-box {
            border-radius: 18px;
            padding: 12px 18px;
            margin-bottom: 20px;
            display: none;
            font-size: 14px;
            backdrop-filter: blur(10px);
        }
        .ai-checking { background: rgba(0, 122, 255, 0.1); border: 1px solid rgba(0, 122, 255, 0.2); color: #007aff; }
        .ai-success { background: rgba(46, 204, 113, 0.1); border: 1px solid rgba(46, 204, 113, 0.2); color: var(--agro-green); }
        .ai-error { background: rgba(255, 59, 48, 0.1); border: 1px solid rgba(255, 59, 48, 0.2); color: var(--agro-error); }

        .upload-area {
            border: 2px dashed var(--glass-border);
            border-radius: 20px;
            padding: 30px;
            text-align: center;
            cursor: pointer;
            transition: 0.3s;
            margin-bottom: 20px;
        }
        .upload-area:hover { border-color: var(--agro-green); background: rgba(46, 204, 113, 0.05); }

        #imagePreviewContainer {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(80px, 1fr));
            gap: 12px;
            margin-bottom: 20px;
        }

        .preview-item {
            width: 80px; height: 80px;
            border-radius: 14px; overflow: hidden;
            border: 1px solid var(--glass-border);
        }
        .preview-item img { width: 100%; height: 100%; object-fit: cover; }

        .submit-btn {
            background: var(--agro-green);
            color: #000; border: none; border-radius: 20px;
            padding: 18px; width: 100%; font-weight: 800;
            transition: 0.4s;
        }
        .submit-btn:disabled {
            background: #333; color: #666; cursor: not-allowed; transform: none !important;
        }
        .submit-btn:hover:not(:disabled) {
            transform: translateY(-3px);
            box-shadow: 0 15px 30px rgba(46, 204, 113, 0.3);
        }

        #imageInput { display: none; }
    </style>
</head>
<body>

<div class="glass-container">
    <div class="ios-card">
        <h2 class="fw-bold mb-2 text-center">Agro AI</h2>
        <p class="text-center small opacity-50 mb-4">Mahsulotni AI orqali tekshirish</p>
        
        <div id="aiStatusBox" class="ai-status-box">
            <i class="fas fa-robot me-2"></i> <span id="aiStatusText">Tahlil qilinmoqda...</span>
        </div>

        <form method="POST" enctype="multipart/form-data" id="productForm">
            {% csrf_token %}
            
            <label class="form-label">Rasmlar (AI tekshiradi)</label>
            <div class="upload-area" onclick="document.getElementById('imageInput').click()">
                <i class="fas fa-camera fa-2x mb-2" style="color: var(--agro-green)"></i>
                <p class="small m-0 opacity-50">Sifatli rasm yuklang</p>
                <input type="file" name="images" id="imageInput" accept="image/*" multiple required>
            </div>

            <div id="imagePreviewContainer"></div>

            <div class="form-group">
                <label class="form-label">Mahsulot nomi</label>
                <input type="text" name="name" id="id_name" class="form-control ios-input" placeholder="AI aniqlaydi..." required>
            </div>

            <div class="row">
                <div class="col-6">
                    <label class="form-label">Narxi (so'm)</label>
                    <input type="number" name="price" class="form-control ios-input" placeholder="0" required>
                </div>
                <div class="col-6">
                    <label class="form-label">Soni</label>
                    <input type="number" name="count" class="form-control ios-input" value="1">
                </div>
            </div>

            <div class="form-group">
                <label class="form-label">Tavsif</label>
                <textarea name="about" id="id_about" class="form-control ios-input" rows="3" placeholder="Sifat darajasi..."></textarea>
            </div>

            <button type="submit" id="submitBtn" class="submit-btn" disabled>
                <i class="fas fa-magic me-2"></i> ANALIZ KUTILMOQDA
            </button>
        </form>

        <a href="{% url 'agro_main' %}" class="back-link text-center d-block mt-3 opacity-30 text-decoration-none small">
            <i class="fas fa-chevron-left"></i> Bekor qilish
        </a>
    </div>
</div>

<script>
    const imageInput = document.getElementById('imageInput');
    const previewContainer = document.getElementById('imagePreviewContainer');
    const aiStatusBox = document.getElementById('aiStatusBox');
    const aiStatusText = document.getElementById('aiStatusText');
    const submitBtn = document.getElementById('submitBtn');
    const nameInput = document.getElementById('id_name');
    const aboutInput = document.getElementById('id_about');

    imageInput.addEventListener('change', async function() {
        previewContainer.innerHTML = '';
        const files = Array.from(this.files);
        if (files.length === 0) return;

        // Visual Preview
        files.forEach(file => {
            const reader = new FileReader();
            reader.onload = (e) => {
                const div = document.createElement('div');
                div.className = 'preview-item';
                div.innerHTML = `<img src="${e.target.result}">`;
                previewContainer.appendChild(div);
            };
            reader.readAsDataURL(file);
        });

        const mainFile = files[0];
        const reader = new FileReader();
        reader.readAsDataURL(mainFile);
        reader.onload = async () => {
            const base64Image = reader.result.split(',')[1];
            
            aiStatusBox.style.display = 'block';
            aiStatusBox.className = 'ai-status-box ai-checking';
            aiStatusText.innerText = "Agro-AI rasmni skanerlamoqda...";
            submitBtn.disabled = true;
            submitBtn.innerHTML = `<span class="spinner-border spinner-border-sm"></span> Tahlil qilinmoqda...`;

            try {
                const response = await fetch('{% url 'check_img' %}', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'X-CSRFToken': '{{ csrf_token }}' },
                    body: JSON.stringify({ image: base64Image })
                });

                const data = await response.json();

                if (data.is_valid) {
                    aiStatusBox.className = 'ai-status-box ai-success';
                    aiStatusText.innerText = "✅ Tasdiqlandi: " + data.description;
                    nameInput.value = data.description; 
                    aboutInput.value = "AI Tahlili: " + data.reason;
                    submitBtn.disabled = false;
                    submitBtn.innerHTML = `<i class="fas fa-check-circle"></i> MAHSULOTNI QO'SHISH`;
                } else {
                    aiStatusBox.className = 'ai-status-box ai-error';
                    aiStatusText.innerText = "❌ Xato: " + data.reason;
                    submitBtn.disabled = true;
                    submitBtn.innerHTML = `<i class="fas fa-times-circle"></i> RAD ETILDI`;
                }
            } catch (error) {
                aiStatusText.innerText = "Aloqa xatosi. Qayta urinib ko'ring.";
                submitBtn.disabled = false;
                submitBtn.innerText = "QO'SHISH (AI-SIZ)";
            }
        };
    });
</script>

</body>
</html>
