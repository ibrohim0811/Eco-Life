<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AgroBiz | Tasdiqlash</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --bg: #0b0d11;
            --glass: rgba(255, 255, 255, 0.03);
            --border: rgba(255, 255, 255, 0.08);
            --agro-green: #2ecc71;
            --gold: #FFD700;
        }

        body {
            background: radial-gradient(circle at top right, #1a1c22, #0b0d11);
            color: #fff;
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
        }

        .auth-container {
            width: 100%;
            max-width: 420px;
            padding: 20px;
        }

        .ios-glass {
            background: var(--glass);
            backdrop-filter: blur(25px) saturate(160%);
            -webkit-backdrop-filter: blur(25px) saturate(160%);
            border: 1px solid var(--border);
            border-radius: 35px;
            padding: 40px;
            box-shadow: 0 25px 50px rgba(0,0,0,0.3);
            text-align: center;
        }

        .icon-box {
            width: 70px;
            height: 70px;
            background: rgba(46, 204, 113, 0.1);
            border-radius: 22px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 25px;
            color: var(--agro-green);
            font-size: 28px;
            border: 1px solid rgba(46, 204, 113, 0.2);
        }

        .phone-display {
            background: rgba(255,255,255,0.05);
            border: 1px solid var(--border);
            border-radius: 18px;
            padding: 15px;
            font-weight: 700;
            letter-spacing: 1px;
            color: var(--agro-green);
            margin-bottom: 30px;
        }

        .otp-input {
            background: rgba(255,255,255,0.05) !important;
            border: 1px solid var(--border) !important;
            border-radius: 20px !important;
            color: #fff !important;
            font-size: 32px !important;
            font-weight: 800 !important;
            letter-spacing: 12px !important;
            padding: 15px !important;
            text-align: center !important;
            transition: all 0.3s;
        }

        .otp-input:focus {
            border-color: var(--agro-green) !important;
            box-shadow: 0 0 15px rgba(46, 204, 113, 0.2) !important;
            background: rgba(255,255,255,0.08) !important;
        }

        .action-btn {
            background: var(--agro-green);
            color: #000;
            border: none;
            border-radius: 20px;
            padding: 18px;
            font-weight: 700;
            width: 100%;
            transition: 0.3s;
            margin-top: 20px;
        }

        .action-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(46, 204, 113, 0.2);
            filter: brightness(1.1);
        }

        .timer-text {
            font-size: 14px;
            opacity: 0.6;
            margin-top: 25px;
        }

        .bot-btn {
            background: rgba(0, 136, 204, 0.1);
            border: 1px solid rgba(0, 136, 204, 0.3);
            color: #0088cc;
            border-radius: 18px;
            padding: 15px;
            text-decoration: none;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 600;
            font-size: 14px;
            transition: 0.3s;
        }

        .bot-btn:hover {
            background: rgba(0, 136, 204, 0.2);
            color: #fff;
        }

        .d-none { display: none; }
    </style>
</head>
<body>

<div class="auth-container">
    <div class="ios-glass">
        <div class="icon-box">
            <i class="fas fa-shield-alt"></i>
        </div>

        <h3 class="fw-bold mb-2">Tasdiqlash</h3>
        <p class="small opacity-50 mb-4">Raqamingizga 6 xonali maxfiy kod yuborildi</p>

        <div class="phone-display">
            <i class="fas fa-phone-alt me-2 small"></i> {{ request.user.phone }}
        </div>

        <form action="{% url 'agro_otp' %}" method="POST">
            {% csrf_token %}
            <input type="text" name="otp" maxlength="6" class="form-control otp-input mb-3" placeholder="000000" autocomplete="one-time-code">
            
            <button type="submit" class="action-btn">
                KODNI TASDIQLASH
            </button>
        </form>

        <div id="timer-container" class="timer-text">
            Kod kelmasa qayta yuborish: <span id="countdown" class="text-white fw-bold">01:00</span>
        </div>

        <div id="resend-container" class="mt-4 d-none">
            <p class="small opacity-50 mb-3">SMS hali ham kelmadimi?</p>
            <a href="https://t.me/SeningAgroBot" target="_blank" class="bot-btn">
                <i class="fab fa-telegram-plane me-2"></i> TELEGRAM BOTDAN OLISH
            </a>
        </div>
    </div>
</div>

<script>
    let timeLeft = 60; // 1 daqiqa
    const timerElement = document.getElementById('countdown');
    const timerContainer = document.getElementById('timer-container');
    const resendContainer = document.getElementById('resend-container');

    const countdown = setInterval(() => {
        if (timeLeft <= 0) {
            clearInterval(countdown);
            timerContainer.classList.add('d-none');
            resendContainer.classList.remove('d-none');
        } else {
            timeLeft--;
            let m = Math.floor(timeLeft / 60);
            let s = timeLeft % 60;
            timerElement.textContent = `${m < 10 ? '0' : ''}${m}:${s < 10 ? '0' : ''}${s}`;
        }
    }, 1000);

    // Faqat raqam kiritishni ta'minlash
    document.querySelector('.otp-input').addEventListener('input', function (e) {
        this.value = this.value.replace(/[^0-9]/g, '');
    });
</script>

</body>
</html>
